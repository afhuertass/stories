</p> <h1 class="mt-5 font-display text-5xl font-bold tracking-[-0.04em] text-white md:text-7xl"> Nunca encontramos a los otros </h1> <div class="mt-8 flex flex-wrap items-center gap-3 text-sm text-slate-300/75"> <span class="rounded-full border border-white/10 px-4 py-2">Por Andres Huertas</span> </div> </header> <section class="mt-10 mx-auto max-w-5xl rounded-[2rem] border border-sky-300/10 bg-slate-950/35 px-6 py-8 shadow-glow backdrop-blur-sm md:px-10 md:py-10"> <style>astro-island,astro-slot,astro-static-slot{display:contents}</style><script>(()=>{var e=async t=>{await(await t())()};(self.Astro||(self.Astro={})).load=e;window.dispatchEvent(new Event("astro:load"));})();;(()=>{var A=Object.defineProperty;var g=(i,o,a)=>o in i?A(i,o,{enumerable:!0,configurable:!0,writable:!0,value:a}):i[o]=a;var d=(i,o,a)=>g(i,typeof o!="symbol"?o+"":o,a);{let i={0:t=>m(t),1:t=>a(t),2:t=>new RegExp(t),3:t=>new Date(t),4:t=>new Map(a(t)),5:t=>new Set(a(t)),6:t=>BigInt(t),7:t=>new URL(t),8:t=>new Uint8Array(t),9:t=>new Uint16Array(t),10:t=>new Uint32Array(t),11:t=>1/0*t},o=t=>{let[l,e]=t;return l in i?i[l](e):void 0},a=t=>t.map(o),m=t=>typeof t!="object"||t===null?t:Object.fromEntries(Object.entries(t).map(([l,e])=>[l,o(e)]));class y extends HTMLElement{constructor(){super(...arguments);d(this,"Component");d(this,"hydrator");d(this,"hydrate",async()=>{var b;if(!this.hydrator||!this.isConnected)return;let e=(b=this.parentElement)==null?void 0:b.closest("astro-island[ssr]");if(e){e.addEventListener("astro:hydrate",this.hydrate,{once:!0});return}let c=this.querySelectorAll("astro-slot"),n={},h=this.querySelectorAll("template[data-astro-template]");for(let r of h){let s=r.closest(this.tagName);s!=null&&s.isSameNode(this)&&(n[r.getAttribute("data-astro-template")||"default"]=r.innerHTML,r.remove())}for(let r of c){let s=r.closest(this.tagName);s!=null&&s.isSameNode(this)&&(n[r.getAttribute("name")||"default"]=r.innerHTML)}let p;try{p=this.hasAttribute("props")?m(JSON.parse(this.getAttrib dCallback(){this.hydrate()}}d(y,"observedAttributes",["props"]),customElements.get("astro-island")||customElements.define("astro-island",y)}})();</script><astro-island uid="1hiNiT" prefix="r0" component-url="/_astro/StoryViewer.DMIR0tWm.js" component-export="default" renderer-url="/_astro/client.DrE9CFQR.js" props="{&quot;story&quot;:[1,[[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;style&quot;:[0,&quot;h2&quot;],&quot;content&quot;:[1,[[0,&quot;I&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Tiene cerca de 5 años desde la migración. He despertado una docena de veces. En el manual de instrucciones dice que es normal, que los primeros 10 a 20 años son de acostumbrarse al proceso y que eventualmente el despertarse de forma involuntaria será menos frecuente, y el deseo de dormir, más fuerte que cualquier otra cosa.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;El puente de mando, el comedor, los cuarteles y salas permanecen ocupados. Creo que despierto cada tres o cuatro meses y a mi alrededor el aire es vibrante; los humores de celebración se mezclan con las largas charlas sobre la vida que a gran velocidad se va quedando atrás. Las salas llenas, la música, las amistades florecen con facilidad en esta nave donde todos tenemos una cosa en común.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Hay ciertos días en los que la Tierra es visible. No directamente o a ojo, pero cuando la rotación de la nave cumple condiciones particulares, los instrumentos ópticos son suficientes para dar una mirada a la vieja casa. Aún son distinguibles los océanos y continentes. Creo que los cálculos geológicos le dan 300 años más antes de que finalmente la corteza ceda y la consecuencia de nuestro último pecado convierta la Tierra en polvo estelar.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;¿Dónde estaré yo en 200 años? Para los que nacimos y crecimos en la Tierra, ese parece un número imposible; para los pequeños bebés que ya nacen y crecen en las incubadoras de la nave, esos 200 años serán apenas el inicio.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Mucho tiempo por delante. Aunque la mayor parte lo pasaremos durmiendo. Despertar cada 10 o 20 años, tomar algunas medidas, ajustes y volver a dormir. Será una extraña vida. ¿Cómo llegamos a convencer a tantos de esta aventura? Bueno, la verdad no era una decisión demasiado difícil, marcharse a las estrellas o perecer en la Tierra. Más sorprende, quizás, a los que se quedaron. Aun sabiendo que sus días están contados.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Aquí, la muerte ha sido de alguna forma exorcizada. El sueño criogénico cura las células y repara el decaimiento; mientras alternemos entre periodos de sueño y breves instancias despiertos, tenemos garantizada una larga vida.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Quizás por eso es un poco banal perder tiempo escribiendo este diario; cada hora que paso despierto hoy, son una decena de años que le robo al futuro. Pero no importa, algún registro debe quedar; luego de los siglos alguien encontrará valor en las palabras de los últimos habitantes de la Tierra, de eso estoy seguro.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Cuando alcancemos Neptuno, los primeros niños nacidos en el Hades I serán adolescentes. Neptuno es nuestra primera parada, de la infinidad que vienen. Y aunque las probabilidades de completar el objetivo primario de la misión allí son escasas, debemos mirar de todos modos; tenemos que encontrar a los otros.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Hace una centena de años que venimos lanzando señales al espacio. Y la única respuesta siempre ha sido el silencio.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Bueno, eso no es del todo cierto. El espacio, en su infinidad, ha en turno revelado secretos profundos, velocidad de la luz, relatividad general, espectros y elementos perdidos para la ciencia; observamos al cielo estelar y, con el tiempo, terminamos observándonos a nosotros. Vimos espirales infinitamente lejanas, agujeros negros devorar sistemas estelares completos, soñamos con planetas cubiertos de diamantes y combustibles tan peligrosos que pondrían en riesgo ciudades enteras. Lo vimos todo desde la seguridad de telescopios y observatorios, todo, menos a ellos. Otros observadores, otro ojo curioso observando al otro lado de la mira. El universo, en su vastedad e infinidad de posibilidades, se burla de nosotros con su vacío, su silencio.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Finalmente, la realidad fue imposible de negar, y el planeta que decae ya no puede ser nuestro hogar. Con la tecnología criogénica completada, nació el plan: una última migración masiva y planetaria. Nos lanzaríamos al espacio, miles de nosotros, millones, tantos como pudiéramos alojar. El fin del mundo no tiene que ser detenido, solo hace falta marcharse.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;II&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Hoy regresan de Neptuno. La primera expedición de nuestra nave. Cada una de las naves mayores cuenta con objetivos diferentes; Ares XXI pasó por Saturno hace algunos años. Las imágenes son espectaculares. Creo que el videógrafo a cargo de la misión de Neptuno no se va a quedar atrás; si la foto captura un 10% de lo que veo en la ventana, creo que daré por bien concluida la tarea. Ares XXI estará celoso.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Monitorear la pantalla de instrumentos es menos divertido. Toma unos cuantos días sacudirse el sueño criogénico, y cada vez dormimos más. Creo que la gente no habla mucho de lo que ocurre entre sueños, pero tengo la sensación de que hay algo mas. Toma tiempo estar listo después de despertarse. No es tan solo el limpiarse todos los fluidos criogénicos del sistema; es como si el cerebro necesitara también un ejercicio especial. La gente pasa algunos días encerrada. He oído varios sonoros llantos, antes de volver de regreso con la tripulación.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Espero la situación mejore, porque luego de Neptuno, el siguiente punto de interés estará a una centena de años de distancia. Creo que solo una o dos centenas de personas estarán despiertas a la vez en todo el complejo, encargadas de pequeñas tareas antes de regresar también a dormir.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Me pregunto si ya nos habrán visto. El estruendo que hicimos el día de la migración, y toda la subsecuente radiación y comunicaciones con las que hemos inundado el cosmos, quizás ellos ya se han percatado de nuestro intento de conquista, quizás se preparan para recibirnos. Por lo pronto, cuando la flota de Neptuno regrese con las muestras y materiales requeridos, será momento de apagar las luces una vez más. Dormir el largo sueño y esperar que un rostro amigable nos reciba al otro lado; así sabremos que ha valido la pena.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;La comunicación con los otros peregrinos es limitada. Toma casi tres terrestes para enviar un mensaje desde nuestra ubicación hasta la nave más cercana —  Ares XX si recuerdo bien—. Otras tres horas de esperar por una respuesta; la pregunta suele ser siempre la misma: ¿los han encontrado, alguien ha visto a los otros? Y la respuesta siempre es no, aquí solo hay silencio.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;De manera que yo, teniente primero Juan Angel Puerta, a mis 89 años de vida, termino este diario por el tiempo presente, 2178 de la era común, y me dispongo a dormir el sueño; en 300 años, espero tener la energía para continuar.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;style&quot;:[0,&quot;h2&quot;],&quot;content&quot;:[1,[[0,&quot;III&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Derrotar a la muerte siempre tuvo más glamour en el papel.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Frankenstein, vampiros, fantasmas. Las historias siempre tuvieron un aire de divinidad, de poder. Sin embargo, ahora que lo hemos logrado, es tan mundano como despertar.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Supongo que toda la magia pasa mientras duermo, la clase de cosas que pasan por mi cuerpo cuando lo recorren los fluidos criogénicos, cuando estoy suspendido en sueños…&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Los sueños… Si los comentarios que se escuchan en el lobby y las salas de comando son de fiar, esos sueños tan largos y extensos como son, tienen mucho más para contar. Creo que nos aterra un poco hablar de ellos.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;No veremos otro planeta en unos 700 años más, pero si las comunicaciones son ciertas, algunos de nosotros lo alcanzaron ya. Según informó el capitán, se trató de un mal cálculo. En la infinidad del espacio y basados en los planes iniciales, nunca dos naves deberían cruzar recorridos así; veremos qué ocurre cuando nos encontremos. Pero en un espacio de recursos limitados, cualquier cosa puede pasar.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;No se trata de la primera colonia tampoco. He oído de dos mundos por lo menos. Los que tuvieron la buena fortuna de dirigirse al inicio a Proxima Centauri, están cerca de cumplir mil años en el nuevo asentamiento. Oí que el comité deliberó por mucho tiempo sobre el nuevo nombre del planeta y base; me alegro mucho de saber que Tierra II no fue elegido; Homestead tiene un toque más elegante. Creo que enviarán algunas imágenes pronto; me pregunto cómo serán sus atardeceres en el nuevo mundo.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Es una sensación extraña regresar al bazar y sala de comando luego del largo sueño. En la plaza central, un contador indica el número de suspendidos, de personas que duermen, así como el de los que estamos despiertos. Cada vez somos menos. Cada vez más, eligen el largo sueño.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Todo esto y aún no encontramos a los otros. El tiempo se ha ido escurriendo, pero nunca hemos dejado de creer en encontrarlos. Es aún un tema recurrente entre los que estamos despiertos; es una de las primeras preguntas que hacen los que terminan el sueño. La respuesta siempre es no. Ha sido así por lo menos un milenio. Fuera de nosotros, este espacio parece tan vacío como el primer día.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Pero bueno, aún hay razones para no perder la fe. Hay colonias y avances tecnológicos; aun mientras dormimos, los pequeños saltos hacia adelante de investigadores y computadores, mejoran nuestras naves y vidas, pequeñas victorias que se van acumulando en los siglos. No tengo duda de que vamos a encontrarlos.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;style&quot;:[0,&quot;h2&quot;],&quot;content&quot;:[1,[[0,&quot;IV&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Los últimos tramos están por terminar. Parece un poco increíble que luego de 40 mil años, la Asociación finalmente esté por dar el paso final. La idea de un riel interestelar puede sonar ridícula (y seguro lo sonó la primera vez que fue planteada), pero ahora todo tiene sentido; las rutas transitadas entre colonias serán un cerca 700% más eficientes. Finalmente, podremos hablar de imperio.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;La Asociación resiste esa palabra. Imperio. Creo que todos la resistimos. No dejamos la casa —en Vega I— para formar un imperio; creo que tan solo nos hartamos de esperar, y salimos a buscar a los otros.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;La mortalidad se resiste a ser del todo conquistada, y los rieles espaciales son más fáciles de lograr que el final definitivo del sueño. Cada despertar viene con su pequeña y garantizada muerte, el pequeño terror de que el mundo en que despertaré no será como este, que es poco probable que vuelva a encontrar a viejos amigos y que las memorias se harán difusas también. Todos llevamos diarios aquí, decenas de miles de años flotando en la inmensidad, resumidos en las pocas palabras que se pueden encontrar al despertar o en instantes antes de comenzar a hibernar una vez más. Nos brindan un toque de sanidad a todos.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Los tiempos entre sueños se han hecho más largos también. A veces puedes pasar una cantidad decente de décadas afuera, antes de tener que regresar al sueño. No deja de ser triste, pasar una docena de años construyendo una vida, para luego no volver a ver, dormir, despertar, volver a empezar. Nos hemos hecho buenos y eficientes con las despedidas&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;En cualquier caso, me alegra haber hecho parte de este último esfuerzo. El riel, una autopista interestelar invisible a los ojos humanos, pero si ellos están alli, es una certeza que finalmente podrán encontrarnos.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;style&quot;:[0,&quot;h2&quot;],&quot;content&quot;:[1,[[0,&quot;V&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Catorce. Según me informan, en el tiempo que duró mi ultimo sueno, catorce versiones diferentes de la Asociacion clamaron propiedad del riel. Actualmente, nadie responde por dicho nombre. Lo único que permance de la Asociacion original, es el sindicato de Mensajeros. Hoy en día solo ellos transitan el riel. Tomó tiempo darse cuenta de los riesgos y consecuencias del viaje eficiente en el riel; no estaba dentro de los cálculos. El camino cambia al mensajero, nunca se puede volver a casa, siempre deben estar en movimiento. Siempre encontramos el límite siguiente de nuestra mortalidad.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Mi puesto es más modesto en esta ocasión. Al despertar encontré mi nueva tarea asignada, como es la norma desde hace miles y miles de ciclos. Ahora soy un hombre de construcciones y maquinaria. En mi cuarto se han presentado los manuales e instrucciones, todo organizado por las máquinas que nos han observado durante milenios y que agendan nuestro futuro con eones de antelación.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Mi nueva tarea es supervisar la construcción de una pequeña estación de reposo, un hotel si se quiere, en el camino del riel. No siempre son tareas tan sencillas; estas tareas pueden variar en rango y alcance. Antes, he sido soldado y general, he sido granjero en los invernaderos de Asterion, he catalogado cometas, he orado en el altar de dioses perdidos, pilotado cargueros entre tormentas y visto mundos secarse gota a gota, me cansé de bautizar estrellas, y en el sistema Alfa Romulus llegaron a llamarme emperador.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Todo esto si estos viejos diarios que llevo leyendo dicen la verdad; no tendrían por qué mentir. No tendría por qué mentirme. Recuerdo poco o nada de esas vidas. Tan distantes, que toda una vida de atrocidades o maravillas debe ser resumida en un pie de página. Hoy me alegra mi tarea; hoy seré un capitán de obra. La estación se llamará Epsilon-12, un pequeño oasis orbitando un planeta aún sin nombre. Aquel bautizo no me corresponde a mí.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Luego de eso, la directiva es marchar, al paso lento pero seguro, lejos del riel; me tomará otras 20 mil unidades terrestres alcanzar el siguiente destino. Una vieja colonia que necesita reparaciones. Parece que en esta vida mi trabajo será reparar. Eso me agrada más. Creo que antes he trabajado con la destrucción bajo mis manos, guiando, soñando. Pero esta es una nueva vida: un capataz de obra, que aún se pregunta dónde están los otros. La única constante en la eternidad espacial es el silencio, el abrumador silencio.&quot;]]]}],[0,{&quot;type&quot;:[0,&quot;text&quot;],&quot;content&quot;:[1,[[0,&quot;Donde quiera que voy, y encuentro a mis hermanos, descendientes de una migración ancestral, cambiados y distintos, pero aún indistinguiblemente nosotros, humanos, donde quiera que voy, continúa la pregunta: ¿Dónde están? ¿Dónde acabará el vacío cósmico, dónde encontraremos a los otros?&quot;]]]}]]]}" ssr="" client="load" opts="{&quot;name&quot;:&quot;StoryViewer&quot;,&quot;value&quot;:true}" await-children=""><div class="relative"><div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-sky-200/30 to-transparent"></div><div class="mx-auto max-w-4xl space-y-[10vh] py-[8vh] md:space-y-[14vh] md:py-[10vh]"><section class="relative"><div class="py-8"><div style="opacity:0;transform:translateY(15px)"><h2 class="font-display text-4xl font-bold text-white md:text-5xl">I</h2></div></div></section></div><div class="mt-6 flex min-h-[120px] justify-center pb-[18vh]" style="opacity:0"><butt
